<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>brah · smash burger · ericeira</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/kit.css">
<style>
  html, body { background: var(--brah-cream); margin: 0; scroll-behavior: smooth; }
  body { font-family: var(--font-body); color: var(--brah-ink); }
  * { box-sizing: border-box; }
  @keyframes brah-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes brah-marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-33.333%); } }
  button, a { font-family: inherit; }
  img { display: block; max-width: 100%; }
  ::selection { background: var(--brah-tomato); color: var(--brah-cream); }
  :focus-visible { outline: 2px solid var(--brah-tomato); outline-offset: 3px; }
  button:focus, a:focus { outline: none; }
  button:focus-visible, a:focus-visible { outline: 2px solid var(--brah-tomato); outline-offset: 3px; }
  button { transition: transform 90ms var(--ease-out), box-shadow var(--t-base) var(--ease-out), background var(--t-base) var(--ease-out); }
  button:active { transform: translateY(1px) scale(0.985); }
  @media (max-width: 600px) {
    div[style*="grid-template-columns: repeat(2, 1fr)"],
    div[style*="grid-template-columns: repeat(3, 1fr)"],
    div[style*="grid-template-columns: repeat(4, 1fr)"] { grid-template-columns: 1fr !important; }
    div[style*="grid-template-columns: repeat(6, 1fr)"] { grid-template-columns: repeat(2, 1fr) !important; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="src/data.js"></script>
<script type="text/babel" src="src/atoms.jsx"></script>
<script type="text/babel" src="src/dir-blend.jsx"></script>
<script type="text/babel">
  const { useState: useStateApp } = React;
  function BrahApp() {
    const [page, setPage] = useStateApp("home");
    const [lang, setLang] = useStateApp("pt");
    const onNav = (id) => { setPage(id === "order" ? "menu" : id); window.scrollTo({ top: 0 }); };
    return <BlendSite page={page} lang={lang} onNav={onNav} onLang={setLang} />;
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<BrahApp />);
</script>
</body>
</html>
