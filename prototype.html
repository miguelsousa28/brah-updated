<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1280, initial-scale=1">
<title>brah — Prototype · 3 directions</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/kit.css">
<style>
  html, body { background: var(--brah-cream); margin: 0; scroll-behavior: smooth; }
  body { font-family: var(--font-body); color: var(--brah-ink); }
  * { box-sizing: border-box; }
  @keyframes brah-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes brah-marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-33.333%); } }
  button, a { font-family: inherit; }
  table { font-family: inherit; }
  img { display: block; max-width: 100%; }

  /* Selection — brand colors */
  ::selection { background: var(--brah-tomato); color: var(--brah-cream); }

  /* Focus rings — tomato, not blue */
  :focus-visible { outline: 2px solid var(--brah-tomato); outline-offset: 3px; }
  button:focus, a:focus { outline: none; }
  button:focus-visible, a:focus-visible { outline: 2px solid var(--brah-tomato); outline-offset: 3px; }

  /* Button press microinteraction (applies to ALL <button>) */
  button { transition: transform 90ms var(--ease-out), box-shadow var(--t-base) var(--ease-out), background var(--t-base) var(--ease-out); }
  button:active { transform: translateY(1px) scale(0.985); }

  /* Bottom padding so the floating direction pill never covers footer content */
  #root > div[data-screen-label] { padding-bottom: 96px; }

  /* ─── Mobile responsive ─── */
  @media (max-width: 900px) {
    /* Stack all two-column grids */
    div[style*="grid-template-columns: 1.15fr 1fr"],
    div[style*="grid-template-columns: 1.1fr 1fr"],
    div[style*="grid-template-columns: 1.4fr 1fr"],
    div[style*="grid-template-columns: 1fr 1.2fr"],
    div[style*="grid-template-columns: 2fr 1fr 1fr 1fr"],
    section[style*="grid-template-columns: 1fr 1fr"],
    div[style*="grid-template-columns: 1fr 1fr"] {
      grid-template-columns: 1fr !important;
      gap: 40px !important;
    }
    div[style*="grid-template-columns: repeat(3, 1fr)"],
    div[style*="grid-template-columns: repeat(4, 1fr)"] {
      grid-template-columns: repeat(2, 1fr) !important;
      gap: 16px !important;
    }
    div[style*="grid-template-columns: repeat(6, 1fr)"] {
      grid-template-columns: repeat(3, 1fr) !important;
    }
    /* Header nav: hide on small */
    header nav { display: none !important; }
    header > div { padding: 0 16px !important; }
    /* Section padding reductions */
    section[style*="padding: 96px"] { padding-top: 56px !important; padding-bottom: 56px !important; }
    section[style*="padding: 120px"] { padding-top: 64px !important; padding-bottom: 64px !important; }
    section[style*="padding: 80px 32px"] { padding: 48px 16px !important; }
  }
  @media (max-width: 600px) {
    div[style*="grid-template-columns: repeat(2, 1fr)"],
    div[style*="grid-template-columns: repeat(3, 1fr)"],
    div[style*="grid-template-columns: repeat(4, 1fr)"] {
      grid-template-columns: 1fr !important;
    }
    div[style*="grid-template-columns: repeat(6, 1fr)"] {
      grid-template-columns: repeat(2, 1fr) !important;
    }
  }

  /* Respect reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="src/data.js"></script>
<script type="text/babel" src="src/atoms.jsx"></script>
<script type="text/babel" src="src/dir-vicio.jsx"></script>
<script type="text/babel" src="src/dir-streetsmash.jsx"></script>
<script type="text/babel" src="src/dir-blend.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
